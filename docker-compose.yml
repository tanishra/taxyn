services:
  api:
    build: .
    container_name: taxyn-backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      GOOGLE_DOCUMENT_AI_SERVICE_ACCOUNT_PATH: /app/secrets/gcp-docai.json
    depends_on:
      - redis
    volumes:
      - ./secrets:/app/secrets:ro
    restart: always

  redis:
    image: redis:alpine
    container_name: taxyn-redis
    ports:
      - "6379:6379"
    restart: always
